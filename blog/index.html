<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - Temuulen Enkhtamir</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

  <!-- Grid background -->
  <div class="nvim-bg"></div>

  <!-- Tab bar / Nav -->
  <nav class="page-nav">
    <div class="page-nav-tabs">
      <a href="../index.html" class="page-nav-tab">
        <span class="page-nav-tab-icon" style="color: var(--blue);">&#9679;</span> dashboard
      </a>
      <a href="../projects.html" class="page-nav-tab">
        <span class="page-nav-tab-icon" style="color: var(--yellow);">&#9679;</span> projects
      </a>
      <a href="index.html" class="page-nav-tab active">
        <span class="page-nav-tab-icon" style="color: var(--green);">&#9679;</span> blog
      </a>
    </div>
    <div class="page-nav-right">
      <span id="mobile-toggle" style="cursor: pointer; display: none;">&#9776;</span>
    </div>
  </nav>

  <!-- Mobile drawer -->
  <div id="mobile-menu" class="mobile-drawer">
    <a href="../index.html">&#9656; Dashboard</a>
    <a href="../projects.html">&#9656; Projects</a>
    <a href="index.html" class="active">&#9656; Blog</a>
  </div>

  <!-- Telescope Picker -->
  <div class="telescope-wrap">
    <div class="telescope">
      <!-- Title bar -->
      <div class="telescope-title-bar">
        <span class="telescope-title">&#9733; Telescope &middot; Blog Posts</span>
      </div>

      <!-- Search prompt -->
      <div class="telescope-prompt">
        <span class="telescope-prompt-icon">&gt;</span>
        <input type="text" class="telescope-input" id="telescope-search" placeholder="Search posts..."
          autocomplete="off">
      </div>

      <!-- Results + Preview -->
      <div class="telescope-body">
        <div class="telescope-results" id="blog-list">
          <div class="telescope-result-item" style="color: var(--fg-dark); justify-content: center; padding: 2rem;">
            Loading posts...
          </div>
        </div>
        <div class="telescope-preview" id="telescope-preview">
          <div style="color: var(--fg-dark); text-align: center; padding-top: 3rem;">
            Select a post to preview
          </div>
        </div>
      </div>

      <!-- Footer hints -->
      <div class="telescope-footer">
        <span><span class="telescope-footer-key">&lt;CR&gt;</span> open</span>
        <span><span class="telescope-footer-key">j/k</span> navigate</span>
        <span><span class="telescope-footer-key">i /</span> search</span>
        <span><span class="telescope-footer-key">&lt;Esc&gt;</span> Unfocus search</span>
      </div>
    </div>
  </div>

  <!-- Statusline -->
  <div class="statusline">
    <div class="st-mode">NORMAL</div>
    <div class="statusline-section st-file">~/blog</div>
    <div class="st-right">
      <div class="st-pos" id="telescope-count">0 / 0</div>
      <div class="st-filetype">telescope</div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/blog.js"></script>
</body>

</html>
